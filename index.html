<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak 2026</title>
    <style>
        :root {
            --gold: #D4AF37;
            --emerald: #064E3B;
            --bg: #0b1a10;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* മൊബൈലിൽ സ്ക്രോൾ ചെയ്യാൻ അനുവദിക്കണം */
            overflow-x: hidden;
            overflow-y: auto; 
            padding: 20px 0;
        }

        .eid-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            max-width: 450px; /* ബോക്സിന്റെ വീതി അല്പം കുറച്ചു */
            width: 85%;
            position: relative;
            z-index: 10;
            margin: auto;
        }

        .photo-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .photo-frame {
            flex: 1;
            height: 140px; /* കമ്പ്യൂട്ടറിൽ കുറഞ്ഞ ഉയരം */
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--gold);
        }

        /* മൊബൈൽ ഡിസ്‌പ്ലേ മാറ്റങ്ങൾ */
        @media (max-width: 480px) {
            .photo-container {
                flex-direction: column; /* മൊബൈലിൽ ഫോട്ടോകൾ താഴെ താഴെ വരും */
            }
            .photo-frame {
                height: 250px; /* മൊബൈലിൽ ഫോട്ടോകൾക്ക് കൂടുതൽ വലിപ്പം */
                width: 100%;
            }
            h1 { font-size: 1.5rem; }
            p { font-size: 0.9rem; }
            .eid-card { padding: 20px; width: 80%; }
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 { color: var(--emerald); margin-bottom: 5px; font-size: 1.8rem; }
        p { color: #333; line-height: 1.6; font-weight: 500; font-size: 1rem; }

        .music-btn {
            background: var(--gold);
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .music-btn:hover { transform: scale(1.05); background: #b8962d; }

        .star {
            position: fixed;
            top: -20px;
            background: linear-gradient(var(--gold), #FFF);
            border-radius: 50%;
            z-index: 100;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <audio id="eidMusic" loop>
        <source src="Eid Mubarak Koottukaar.mp3" type="audio/mpeg">
    </audio>

    <div class="eid-card">
        <div class="photo-container">
            <div class="photo-frame"><img src="WhatsApp Image 2026-02-18 at 8.40.20 PM.jpeg" alt="Child 1"></div>
            <div class="photo-frame"><img src="WhatsApp Image 2026-02-18 at 8.41.46 PM.jpeg" alt="Child 2"></div>
            <div class="photo-frame"><img src="WhatsApp Image 2026-02-18 at 8.40.03 PM.jpeg" alt="Child 3"></div>
        </div>
        
        <h1>Eid Mubarak</h1>
        <p>"ഈ ഈദ് ദിനത്തിൽ സ്നേഹത്തിന്റെയും സന്തോഷത്തിന്റെയും പൊൻകിരണങ്ങൾ നിങ്ങളുടെ വീട്ടിലും മനസ്സിലും നിറയട്ടെ. ഞങ്ങൾ മക്കളുടെ വക സ്നേഹം നിറഞ്ഞ ഈദ് മുബാറക്!"</p>

        <button class="music-btn" onclick="toggleMusic()">
            <span id="btnIcon">🎵</span> <span id="btnText">Play Music</span>
        </button>
    </div>

    <script>
        function createStars() {
            const body = document.body;
            // മൊബൈലിൽ നക്ഷത്രങ്ങളുടെ എണ്ണം അല്പം കുറച്ചു (Performance-ന് വേണ്ടി)
            const starCount = window.innerWidth < 480 ? 25 : 45; 
            for (let i = 0; i < starCount; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                let size = Math.random() * 5 + 2 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.animationDuration = Math.random() * 3 + 2 + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.opacity = Math.random();
                body.appendChild(star);
            }
        }

        function toggleMusic() {
            const music = document.getElementById('eidMusic');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            
            if (music.paused) {
                music.play().catch(() => alert("Music link missing or error!"));
                btnText.innerHTML = "Pause";
                btnIcon.innerHTML = "⏸";
            } else {
                music.pause();
                btnText.innerHTML = "Play Music";
                btnIcon.innerHTML = "🎵";
            }
        }

        createStars();
    </script>
</body>
</html>
