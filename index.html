<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eid Mubarak 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Manjari&family=Noto+Serif+Malayalam&display=swap" rel="stylesheet">

<style>

:root{
--gold:#D4AF37;
--emerald:#064E3B;
--bg:#0b1a10;
}

body{
margin:0;
background:var(--bg);
font-family:'Segoe UI',sans-serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
overflow-x:hidden;
overflow-y:auto;
padding:20px 0;
}

.eid-card{
background:white;
border-radius:30px;
padding:25px;
text-align:center;
box-shadow:0 15px 50px rgba(0,0,0,0.5);
max-width:450px;
width:85%;
margin:auto;
z-index:10;
position:relative;
}

.photo-container{
display:flex;
gap:10px;
margin-bottom:20px;
}

.photo-frame{
flex:1;
height:140px;
border-radius:12px;
overflow:hidden;
border:2px solid var(--gold);
}

.photo-frame img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
color:var(--emerald);
margin-bottom:5px;
font-size:1.8rem;
}

/* greeting text */

.message{
font-family:'Manjari','Noto Serif Malayalam',serif;
font-size:26px;
color:#0a7a4b;
line-height:1.6;
}

/* name color animation */

.names span{
font-weight:bold;
animation:rgbChange 4s infinite;
}

.names span:nth-child(1){animation-delay:0s;}
.names span:nth-child(2){animation-delay:0.5s;}
.names span:nth-child(3){animation-delay:1s;}
.names span:nth-child(4){animation-delay:1.5s;}

@keyframes rgbChange{
0%{color:rgb(255,0,0);}
25%{color:rgb(0,255,0);}
50%{color:rgb(0,0,255);}
75%{color:rgb(255,165,0);}
100%{color:rgb(255,0,255);}
}

/* music button */

.music-btn{
background:var(--gold);
border:none;
padding:12px 25px;
border-radius:50px;
color:white;
cursor:pointer;
font-weight:bold;
margin-top:15px;
display:inline-flex;
align-items:center;
gap:8px;
transition:0.3s;
}

.music-btn:hover{
transform:scale(1.05);
background:#b8962d;
}

/* falling stars */

.star{
position:fixed;
top:-20px;
background:linear-gradient(var(--gold),#FFF);
border-radius:50%;
z-index:100;
pointer-events:none;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* mobile */

@media (max-width:480px){

.photo-container{
flex-direction:column;
}

.photo-frame{
height:250px;
width:100%;
}

h1{
font-size:1.5rem;
}

.message{
font-size:22px;
}

.eid-card{
padding:20px;
width:80%;
}

}

</style>
</head>

<body>

<audio id="eidMusic" loop>
<source src="Eid Mubarak Koottukaar.mp3" type="audio/mpeg">
</audio>

<div class="eid-card">

<div class="photo-container">

<div class="photo-frame">
<img src="WhatsApp Image 2026-02-18 at 8.40.20 PM.jpeg">
</div>

<div class="photo-frame">
<img src="WhatsApp Image 2026-02-18 at 8.41.46 PM.jpeg">
</div>

<div class="photo-frame">
<img src="WhatsApp Image 2026-02-18 at 8.40.03 PM.jpeg">
</div>

<div class="photo-frame">
<img src="Screenshot 2026-03-15 084655.png">
</div>

</div>

<h1>Eid Mubarak</h1>

<div class="message">

ഈ Eid ദിനത്തിൽ സ്നേഹത്തിന്റെയും സന്തോഷത്തിന്റെയും പൊൻകിരണങ്ങൾ നിങ്ങളുടെ വീട്ടിലും മനസ്സിലും നിറയട്ടെ.<br>

ഞങ്ങളുടെ മക്കളായ 

<b class="names">
<span>Ayishu</span>, 
<span>Ishan</span>, 
<span>Hannan</span>, 
<span>Zaman</span>
</b>

എന്നിവരുടെ വക<br>

🌙 <b>സ്നേഹം നിറഞ്ഞ Eid Mubarak!</b> ✨

</div>

<button class="music-btn" onclick="toggleMusic()">
<span id="btnIcon">🎵</span>
<span id="btnText">Play Music</span>
</button>

</div>

<script>

function createStars(){

const body=document.body;

const starCount=window.innerWidth<480?25:45;

for(let i=0;i<starCount;i++){

let star=document.createElement('div');

star.className='star';

let size=Math.random()*5+2+'px';

star.style.width=size;
star.style.height=size;

star.style.left=Math.random()*100+'vw';

star.style.animationDuration=Math.random()*3+2+'s';

star.style.animationDelay=Math.random()*5+'s';

star.style.opacity=Math.random();

body.appendChild(star);

}

}

function toggleMusic(){

const music=document.getElementById('eidMusic');

const btnText=document.getElementById('btnText');

const btnIcon=document.getElementById('btnIcon');

if(music.paused){

music.play().catch(()=>alert("Music link missing or error!"));

btnText.innerHTML="Pause";

btnIcon.innerHTML="⏸";

}

else{

music.pause();

btnText.innerHTML="Play Music";

btnIcon.innerHTML="🎵";

}

}

createStars();

</script>

</body>
</html>
